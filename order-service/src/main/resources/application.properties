# Server Port
server.port=${SERVER_PORT:8082}

# Database Configuration (Docker network endpoint)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://order-db:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Feign Client URLs
catalog.service.url=${CATALOG_SERVICE_URL:http://catalog-service:8081}
cart.service.url=${CART_SERVICE_URL:http://cart-service:5001}
